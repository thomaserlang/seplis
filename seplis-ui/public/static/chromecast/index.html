<!doctype html>
<html>
  <head>
    <title>SEPLIS CAST</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <style>
      body {
        --progress-color: #428bca;
        --splash-image: url("/img/seplis_background.jpg");
        --splash-size: cover;
        --logo-image: url("/img/apple-touch-icon.png");
        --playback-logo-image: url("/img/apple-touch-icon.png");
      }
    </style>
  </head>

  <body>
    <cast-media-player></cast-media-player>
    <div
      id="dbg"
      style="
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        color: rgb(232, 232, 232);
        font-size: 28px;
        padding: 12px 20px;
        z-index: 9999;
        border-radius: 8px;
        display: none;
      "
    ></div>
    <script>
      function dbg(msg) {
        const el = document.getElementById("dbg");
        el.textContent = msg;
        el.style.display = "block";
        clearTimeout(el._t);
        el._t = setTimeout(() => {
          el.style.display = "none";
        }, 10000);
      }

      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      const CAST_NAMESPACE = "urn:x-cast:seplis.player";

      function applySubtitleOffset(offset) {
        try {
          const castPlayer =
            document.getElementsByTagName("cast-media-player")[0];
          const video = castPlayer.shadowRoot.querySelector("video");
          if (video) {
            dbg("Applying subtitle offset: " + offset + "s");
            const tracks = video.textTracks;
            for (let i = 0; i < tracks.length; i++) {
              const track = tracks[i];
              if (track.kind !== "subtitles" || !track.cues) continue;
              for (let j = 0; j < track.cues.length; j++) {
                const cue = track.cues[j];
                if (!("_originalStart" in cue)) {
                  cue._originalStart = cue.startTime;
                  cue._originalEnd = cue.endTime;
                }
                cue.startTime = cue._originalStart + offset;
                cue.endTime = cue._originalEnd + offset;
              }
            }
          } else {
            dbg("Video element not found, cannot apply subtitle offset");
          }
        } catch (err) {
          dbg("Error applying subtitle offset" + err.message);
        }
      }

      context.addCustomMessageListener(CAST_NAMESPACE, (event) => {
        dbg("raw: " + JSON.stringify(event.data));
        const data = event.data;
        if (!data || data.type !== "subtitleOffset") return;
        applySubtitleOffset(data.offset);
      });


      let customData = null;
      let keepAliveTimer = null;
      let lastSavedPosition = 0;
      let watchedIncremented = false;

      function startKeepAlive(url) {
        if (keepAliveTimer) clearInterval(keepAliveTimer);
        keepAliveTimer = setInterval(() => {
          fetch(url).catch(() => {});
        }, 4000);
      }

      function apiRequest(url, method, body) {
        if (!url || !customData?.token) return;
        fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${customData.token}`,
          },
          body: body ? JSON.stringify(body) : undefined,
        }).catch(() => {});
      }

      playerManager.addEventListener(
        cast.framework.events.EventType.REQUEST_LOAD,
        (event) => {
          customData = event.requestData?.customData ?? null;
          lastSavedPosition = 0;
          watchedIncremented = false;
          if (customData?.keep_alive_url) {
            startKeepAlive(customData.keep_alive_url);
          }
        },
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.TIME_UPDATE,
        (event) => {
          if (!customData) return;
          const time = Math.floor(event.currentMediaTime);
          if (time < 5) return;

          const duration =
            customData.duration ?? playerManager.getDurationSec();
          if (!watchedIncremented && duration > 0 && time >= duration * 0.9) {
            watchedIncremented = true;
            apiRequest(customData.watched_url, "POST", {});
            return;
          }

          if (time % 10 === 0 && time !== lastSavedPosition) {
            lastSavedPosition = time;
            apiRequest(customData.save_position_url, "PUT", { position: time });
          }
        },
      );

      context.start();
    </script>
  </body>
</html>
