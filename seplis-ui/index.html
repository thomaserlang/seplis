<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="/img/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/img/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/img/favicon-16x16.png"
    />
    <link rel="manifest" href="/img/manifest.json" />
    <link rel="mask-icon" href="/img/safari-pinned-tab.svg" color="#428bca" />
    <meta name="theme-color" content="#428bca" />
    <title>SEPLIS</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Load the Cast Receiver SDK synchronously (blocking) only on the
      /cast-receiver page so it is ready before React starts.
      Must come before the module script.
    -->
    <script>
      if (window.location.pathname.startsWith('/cast-receiver')) {
        document.write(
          '<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"><\/script>'
        )
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
